<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用量监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse at top, #1e1b4b 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, #312e81 0%, transparent 50%);
            color: var(--text);
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            margin-bottom: 24px; 
            font-size: 24px;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #334155;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }
        .provider-badge {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-minimax {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.danger { color: #ef4444; }
        
        .refresh-bar {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .refresh-icon {
            font-size: 24px;
        }
        .refresh-info {
            flex: 1;
        }
        .refresh-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .refresh-time {
            font-size: 16px;
            font-weight: 600;
        }
        .countdown {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .model-tag {
            display: inline-block;
            background: var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .usage-bar {
            background: #334155;
            border-radius: 8px;
            height: 8px;
            margin-top: 8px;
            overflow: hidden;
        }
        .usage-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s;
        }
        .usage-bar-fill.low { background: var(--success); }
        .usage-bar-fill.medium { background: var(--warning); }
        .usage-bar-fill.high { background: var(--danger); }
        
        .error {
            background: #7f1d1d;
            border-radius: 12px;
            padding: 16px;
            color: #f87171;
            text-align: center;
        }
        
        .config-note {
            text-align: center;
            padding: 12px;
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        .model-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .model-btn {
            padding: 4px 12px;
            border-radius: 16px;
            border: 1px solid #334155;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .model-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .model-btn:hover {
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 用量监控</h1>
        
        <!-- MiniMax 用量 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">🤖 MiniMax</span>
                <span class="provider-badge badge-minimax">MiniMax</span>
            </div>
            
            <div class="model-selector" id="modelSelector"></div>
            
            <div id="minimaxContent">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- 下次刷新 -->
        <div class="refresh-bar">
            <span class="refresh-icon">🔄</span>
            <div class="refresh-info">
                <div class="refresh-label">下次刷新</div>
                <div class="refresh-time" id="nextRefresh">--</div>
            </div>
            <div class="countdown" id="countdown">60s</div>
        </div>
        
        <div class="config-note">
            API Key 已加密存储在 Vercel 环境变量
        </div>
    </div>

    <script>
        const REFRESH_INTERVAL = 60;
        let remainingSeconds = REFRESH_INTERVAL;
        let countdownTimer;
        let allModels = [];
        let selectedModel = 'MiniMax-M2.7';
        
        // 从 Vercel API 获取 MiniMax 用量
        async function fetchMiniMaxUsage() {
            try {
                const response = await fetch('/api/usage');
                const data = await response.json();
                
                if (data.base_resp?.status_msg !== 'success') {
                    throw new Error(data.base_resp?.status_msg || 'API Error');
                }
                
                allModels = data.model_remains || [];
                renderModelSelector();
                renderSelectedModel();
            } catch (e) {
                renderError(e.message);
            }
        }
        
        function renderModelSelector() {
            const container = document.getElementById('modelSelector');
            container.innerHTML = allModels.map(m => `
                <button class="model-btn ${m.model_name === selectedModel ? 'active' : ''}" 
                        onclick="selectModel('${m.model_name}')">
                    ${m.model_name}
                </button>
            `).join('');
        }
        
        function selectModel(modelName) {
            selectedModel = modelName;
            renderModelSelector();
            renderSelectedModel();
        }
        
        function renderSelectedModel() {
            const model = allModels.find(m => m.model_name === selectedModel);
            if (!model) {
                document.getElementById('minimaxContent').innerHTML = '<div class="loading">选择模型...</div>';
                return;
            }
            
            const total = model.current_weekly_total_count || 0;
            const used = model.current_weekly_usage_count || 0;
            const remains = total - used;
            const percent = total > 0 ? ((used / total) * 100).toFixed(1) : 0;
            const percentClass = percent > 80 ? 'high' : percent > 50 ? 'medium' : 'low';
            const percentColor = percent > 80 ? 'var(--danger)' : percent > 50 ? 'var(--warning)' : 'var(--success)';
            
            // 转换剩余时间为可读格式
            const remainsTime = formatTime(model.weekly_remains_time || 0);
            
            const html = `
                <div class="stat-row">
                    <span class="stat-label">本周已用</span>
                    <span class="stat-value">${formatNumber(used)}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">本周剩余</span>
                    <span class="stat-value ${percentClass === 'high' ? 'danger' : percentClass === 'medium' ? 'warning' : 'success'}">${formatNumber(remains)}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">本周总额</span>
                    <span class="stat-value">${formatNumber(total)}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">使用占比</span>
                    <span class="stat-value" style="color:${percentColor}">${percent}%</span>
                </div>
                <div class="usage-bar">
                    <div class="usage-bar-fill ${percentClass}" style="width:${percent}%;background:${percentColor}"></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">剩余时间</span>
                    <span class="stat-value">${remainsTime}</span>
                </div>
            `;
            document.getElementById('minimaxContent').innerHTML = html;
        }
        
        function renderError(msg) {
            document.getElementById('minimaxContent').innerHTML = `
                <div class="error">
                    获取失败: ${msg}
                </div>
            `;
        }
        
        function formatNumber(num) {
            if (!num && num !== 0) return '0';
            num = parseFloat(num);
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function formatTime(ms) {
            if (!ms || ms <= 0) return '已用完';
            
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (days > 0) return `${days}天${hours % 24}小时`;
            if (hours > 0) return `${hours}小时${minutes % 60}分`;
            if (minutes > 0) return `${minutes}分${seconds % 60}秒`;
            return `${seconds}秒`;
        }
        
        function updateCountdown() {
            remainingSeconds--;
            document.getElementById('countdown').textContent = remainingSeconds + 's';
            document.getElementById('nextRefresh').textContent = new Date(Date.now() + remainingSeconds * 1000).toLocaleTimeString();
            
            if (remainingSeconds <= 0) {
                remainingSeconds = REFRESH_INTERVAL;
                fetchMiniMaxUsage();
            }
        }
        
        // 初始化
        function init() {
            fetchMiniMaxUsage();
            countdownTimer = setInterval(updateCountdown, 1000);
            document.getElementById('nextRefresh').textContent = new Date(Date.now() + REFRESH_INTERVAL * 1000).toLocaleTimeString();
        }
        
        init();
    </script>
</body>
</html>
