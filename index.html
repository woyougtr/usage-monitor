<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用量监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse at top, #1e1b4b 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, #312e81 0%, transparent 50%);
            color: var(--text);
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            margin-bottom: 24px; 
            font-size: 24px;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #334155;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }
        .provider-badge {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.danger { color: #ef4444; }
        
        .refresh-bar {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .refresh-icon {
            font-size: 24px;
        }
        .refresh-info {
            flex: 1;
        }
        .refresh-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .refresh-time {
            font-size: 16px;
            font-weight: 600;
        }
        .countdown {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .model-tag {
            display: inline-block;
            background: var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .usage-bar {
            background: #334155;
            border-radius: 8px;
            height: 8px;
            margin-top: 8px;
            overflow: hidden;
        }
        .usage-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s;
        }
        .usage-bar-fill.low { background: var(--success); }
        .usage-bar-fill.medium { background: var(--warning); }
        .usage-bar-fill.high { background: var(--danger); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 用量监控</h1>
        
        <!-- OpenClaw 当前会话 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">🤖 OpenClaw 当前会话</span>
                <span class="provider-badge">OpenClaw</span>
            </div>
            <div id="openclawContent">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- 下次刷新 -->
        <div class="refresh-bar">
            <span class="refresh-icon">🔄</span>
            <div class="refresh-info">
                <div class="refresh-label">数据更新时间</div>
                <div class="refresh-time" id="updateTime">--</div>
            </div>
            <div class="countdown" id="countdown">60s</div>
        </div>
        
        <div style="text-align:center;padding:16px;color:var(--text-secondary);font-size:12px">
            数据来自当前 OpenClaw 会话<br>
            刷新页面获取最新数据
        </div>
    </div>

    <script>
        const REFRESH_INTERVAL = 60;
        let remainingSeconds = REFRESH_INTERVAL;
        let countdownTimer;
        
        // 获取当前会话用量
        async function fetchOpenClawUsage() {
            // 通过 API 获取 session 状态
            try {
                // 尝试从 localStorage 获取（如果页面嵌入在 OpenClaw 中）
                const stored = localStorage.getItem('openclaw_usage');
                if (stored) {
                    const data = JSON.parse(stored);
                    renderOpenClawUsage(data);
                } else {
                    renderManualRefresh();
                }
            } catch (e) {
                renderManualRefresh();
            }
        }
        
        function renderManualRefresh() {
            document.getElementById('openclawContent').innerHTML = `
                <div style="text-align:center;padding:20px;color:var(--text-secondary)">
                    <p style="margin-bottom:12px">请在 OpenClaw 中发送"状态"获取数据</p>
                    <p style="font-size:12px">或刷新页面更新</p>
                </div>
            `;
        }
        
        function renderOpenClawUsage(data) {
            const contextPercent = data.contextPercent || 0;
            const contextClass = contextPercent > 80 ? 'high' : contextPercent > 50 ? 'medium' : 'low';
            const contextClassColor = contextPercent > 80 ? 'var(--danger)' : contextPercent > 50 ? 'var(--warning)' : 'var(--success)';
            
            const html = `
                <div class="stat-row">
                    <span class="stat-label">模型</span>
                    <span class="stat-value" style="font-size:14px">${data.model || 'MiniMax-M2.7'}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">输入 Token</span>
                    <span class="stat-value">${formatNumber(data.inputTokens)}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">输出 Token</span>
                    <span class="stat-value">${formatNumber(data.outputTokens)}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">上下文使用</span>
                    <span class="stat-value" style="color:${contextClassColor}">${contextPercent}%</span>
                </div>
                <div class="usage-bar">
                    <div class="usage-bar-fill ${contextClass}" style="width:${contextPercent}%;background:${contextClassColor}"></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">缓存命中率</span>
                    <span class="stat-value">${data.cacheHit || '0%'}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">会话时长</span>
                    <span class="stat-value">${data.sessionAge || '--'}</span>
                </div>
            `;
            document.getElementById('openclawContent').innerHTML = html;
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            num = parseInt(num);
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function updateCountdown() {
            remainingSeconds--;
            document.getElementById('countdown').textContent = remainingSeconds + 's';
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
            
            if (remainingSeconds <= 0) {
                remainingSeconds = REFRESH_INTERVAL;
                location.reload();
            }
        }
        
        // 初始化
        function init() {
            fetchOpenClawUsage();
            countdownTimer = setInterval(updateCountdown, 1000);
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
        }
        
        init();
    </script>
</body>
</html>
