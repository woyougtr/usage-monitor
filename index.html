<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用量管家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-light: #34d399;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f0fdf4;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            color: var(--text);
            padding: 20px;
        }
        .container { max-width: 420px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            margin-bottom: 24px; 
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        h1 span {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        .provider-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }
        .provider-badge:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        .refresh-btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--primary), #059669);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .refresh-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }
        .refresh-btn:active {
            transform: translateY(0);
        }
        .refresh-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }
        .section {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px dashed #f3f4f6;
        }
        .section:last-child { 
            margin-bottom: 0; 
            padding-bottom: 0;
            border-bottom: none;
        }
        .section-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .stat-value {
            font-size: 16px;
            font-weight: 600;
        }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.danger { color: #ef4444; }
        .stat-value.primary { color: var(--primary); }
        
        .usage-bar {
            background: #f3f4f6;
            border-radius: 10px;
            height: 8px;
            margin-top: 10px;
            overflow: hidden;
        }
        .usage-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .usage-bar-fill.low { background: linear-gradient(90deg, #34d399, #10b981); }
        .usage-bar-fill.medium { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .usage-bar-fill.high { background: linear-gradient(90deg, #f87171, #ef4444); }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(16, 185, 129, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            padding: 12px 24px;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        
        .error {
            background: #fef2f2;
            border-radius: 12px;
            padding: 16px;
            color: #ef4444;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 <span>用量管家</span></h1>
        
        <!-- MiniMax 用量 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">🤖 MiniMax</span>
                <span class="provider-badge" onclick="manualRefresh()">刷新</span>
            </div>
            
            <div id="minimaxContent">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        const REFRESH_INTERVAL = 60;
        let remainingSeconds = REFRESH_INTERVAL;
        let countdownTimer;
        let allModels = [];
        let selectedModel = 'MiniMax-M2.7';
        
        async function fetchMiniMaxUsage(showLoading = false) {
            if (showLoading) {
                const btn = document.querySelector('.provider-badge');
                btn.innerHTML = '<span class="loading-spinner"></span>刷新';
            }
            
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);
                const response = await fetch('/api/usage', { signal: controller.signal });
                clearTimeout(timeout);
                const data = await response.json();
                
                if (data.base_resp?.status_msg !== 'success') {
                    throw new Error(data.base_resp?.status_msg || 'API Error');
                }
                
                allModels = data.model_remains || [];
                if (!allModels.find(m => m.model_name === selectedModel)) {
                    selectedModel = allModels[0]?.model_name || '';
                }
                renderSelectedModel();
                
                if (showLoading) {
                    showToast('刷新成功');
                    document.querySelector('.provider-badge').innerHTML = '🔄 刷新';
                }
            } catch (e) {
                const msg = e.name === 'AbortError' ? '请求超时，请检查网络' : e.message;
                document.getElementById('minimaxContent').innerHTML = `
                    <div class="error">获取失败: ${msg}</div>
                `;
                if (showLoading) {
                    showToast('刷新失败');
                    document.querySelector('.provider-badge').innerHTML = '🔄 刷新';
                }
            }
        }
        
        function renderSelectedModel() {
            const model = allModels.find(m => m.model_name === selectedModel);
            
            if (!model) {
                document.getElementById('minimaxContent').innerHTML = '<div class="loading">加载中...</div>';
                return;
            }
            
            // 当前周期数据
            const intervalTotal = model.current_interval_total_count || 0;
            const intervalRemaining = model.current_interval_usage_count || 0;
            const intervalUsed = intervalTotal - intervalRemaining;
            const intervalPercent = intervalTotal > 0 ? ((intervalUsed / intervalTotal) * 100).toFixed(1) : 0;
            
            // 本周数据
            const weeklyTotal = model.current_weekly_total_count || 0;
            const weeklyRemaining = model.current_weekly_usage_count || 0;
            const weeklyUsed = weeklyTotal - weeklyRemaining;
            const weeklyPercent = weeklyTotal > 0 ? ((weeklyUsed / weeklyTotal) * 100).toFixed(1) : 0;
            
            // 当前周期剩余时间
            const intervalRemainTime = formatTime(model.remains_time || 0);
            
            // 颜色
            const intervalColor = intervalPercent > 80 ? 'danger' : intervalPercent > 50 ? 'warning' : 'success';
            const weeklyColor = weeklyPercent > 80 ? 'danger' : weeklyPercent > 50 ? 'warning' : 'success';
            
            const html = `
                <div class="section">
                    <div class="section-title">⏱️ 当前周期（剩余 ${intervalRemainTime}）</div>
                    <div class="stat-row">
                        <span class="stat-label">剩余次数</span>
                        <span class="stat-value ${intervalColor}">${intervalRemaining}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">已用次数</span>
                        <span class="stat-value">${intervalUsed}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">总次数</span>
                        <span class="stat-value">${intervalTotal}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">已用占比</span>
                        <span class="stat-value ${intervalColor}">${intervalPercent}%</span>
                    </div>
                    <div class="usage-bar">
                        <div class="usage-bar-fill ${intervalPercent > 80 ? 'high' : intervalPercent > 50 ? 'medium' : 'low'}" 
                             style="width:${intervalPercent}%"></div>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">📅 本周</div>
                    <div class="stat-row">
                        <span class="stat-label">剩余额度</span>
                        <span class="stat-value ${weeklyColor}">${weeklyRemaining}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">已用额度</span>
                        <span class="stat-value">${weeklyUsed}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">总额度</span>
                        <span class="stat-value">${weeklyTotal}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">已用占比</span>
                        <span class="stat-value ${weeklyColor}">${weeklyPercent}%</span>
                    </div>
                    <div class="usage-bar">
                        <div class="usage-bar-fill ${weeklyPercent > 80 ? 'high' : weeklyPercent > 50 ? 'medium' : 'low'}" 
                             style="width:${weeklyPercent}%"></div>
                    </div>
                </div>
            `;
            document.getElementById('minimaxContent').innerHTML = html;
        }
        
        function formatTime(ms) {
            if (!ms || ms <= 0) return '已用完';
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            if (days > 0) return `${days}天${hours % 24}小时`;
            if (hours > 0) return `${hours}小时${minutes % 60}分`;
            if (minutes > 0) return `${minutes}分${seconds % 60}秒`;
            return `${seconds}秒`;
        }
        
        function manualRefresh() {
            fetchMiniMaxUsage(true);
            remainingSeconds = REFRESH_INTERVAL;
        }
        
        function autoRefreshLoop() {
            remainingSeconds--;
            if (remainingSeconds <= 0) {
                remainingSeconds = REFRESH_INTERVAL;
                fetchMiniMaxUsage();
            }
            countdownTimer = setTimeout(autoRefreshLoop, 1000);
        }
        
        function init() {
            fetchMiniMaxUsage();
            autoRefreshLoop();
        }
        
        init();
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        <div id="toast"></div>
    </script>
</body>
</html>
